<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>苏苏的书房</title>
  <style>
    /* ===== 全局重置 ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; min-height: 100vh; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
      background: #f2f1f6;
      color: #1c1c1e;
      -webkit-tap-highlight-color: transparent;
    }
    input, textarea, button { font-family: inherit; outline: none; border: none; background: none; }
    button { cursor: pointer; }

    /* ===== 页面容器 ===== */
    .page {
      position: fixed; inset: 0;
      display: none; flex-direction: column;
      overflow: hidden;
      width: 100%; height: 100vh;
      transition: opacity .3s ease;
    }
    .page.active { display: flex; }

    /* ===== 安全区适配 ===== */
    .safe-top    { height: env(safe-area-inset-top, 44px); flex-shrink: 0; }
    .safe-bottom { height: env(safe-area-inset-bottom, 20px); flex-shrink: 0; }

    /* ========================================
       SPLASH PAGE
    ======================================== */
    #page-splash {
      background: linear-gradient(160deg, #0f0c29, #302b63, #24243e);
      align-items: center; justify-content: center;
      position: fixed; inset: 0; width: 100%; height: 100vh;
      overflow: hidden;
    }
    .splash-particles {
      position: absolute; inset: 0; pointer-events: none;
    }
    .particle {
      position: absolute; border-radius: 50%;
      animation: float-particle linear infinite;
      opacity: .6;
    }
    @keyframes float-particle {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: .6; }
      90%  { opacity: .6; }
      100% { transform: translateY(-100px) scale(1); opacity: 0; }
    }
    .splash-content { text-align: center; z-index: 1; }
    .splash-book-icon {
      width: 90px; height: 110px; margin: 0 auto 32px;
      position: relative; animation: book-float 3s ease-in-out infinite;
    }
    @keyframes book-float {
      0%,100% { transform: translateY(0) rotate(-3deg); }
      50%      { transform: translateY(-12px) rotate(3deg); }
    }
    .splash-book-icon svg { width: 100%; height: 100%; }
    .splash-title {
      font-size: 38px; font-weight: 700; letter-spacing: 6px;
      color: #fff; text-shadow: 0 2px 20px rgba(255,255,255,.3);
      margin-bottom: 12px;
    }
    .splash-subtitle {
      font-size: 14px; color: rgba(255,255,255,.55);
      letter-spacing: 2px; margin-bottom: 56px;
    }
    .splash-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: linear-gradient(135deg, #c9a96e, #e8c88a);
      color: #1a1208; font-size: 17px; font-weight: 600;
      padding: 15px 44px; border-radius: 50px;
      box-shadow: 0 8px 32px rgba(201,169,110,.45);
      transition: transform .15s, box-shadow .15s;
      letter-spacing: 2px;
    }
    .splash-btn:active { transform: scale(.97); box-shadow: 0 4px 16px rgba(201,169,110,.35); }

    /* ========================================
       NAVBAR
    ======================================== */
    .navbar {
      display: flex; align-items: center;
      padding: 0 16px; height: 52px; flex-shrink: 0;
      position: relative; z-index: 10;
    }
    .navbar-title {
      position: absolute; left: 50%; transform: translateX(-50%);
      font-size: 17px; font-weight: 600; color: #1c1c1e;
      white-space: nowrap;
    }
    .navbar-btn {
      display: flex; align-items: center; gap: 4px;
      font-size: 16px; color: #007aff; padding: 6px 0;
      background: none; border: none;
    }
    .navbar-btn svg { width: 20px; height: 20px; }
    .navbar-right { margin-left: auto; }

    /* ========================================
       BOOKSHELF PAGE
    ======================================== */
    #page-bookshelf { background: #f2f1f6; }
    .bookshelf-header {
      background: rgba(242,241,246,.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: .5px solid rgba(0,0,0,.08);
      flex-shrink: 0;
    }
    .bookshelf-title-row {
      padding: 8px 20px 12px;
    }
    .bookshelf-main-title {
      font-size: 28px; font-weight: 700; color: #1c1c1e;
    }
    .bookshelf-meta {
      font-size: 13px; color: #8e8e93; margin-top: 2px;
    }
    .bookshelf-scroll {
      flex: 1; overflow-y: auto; padding: 16px 12px 80px;
      -webkit-overflow-scrolling: touch;
    }
    .book-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 20px 12px;
    }
    .book-item {
      display: flex; flex-direction: column; align-items: center;
      cursor: pointer;
    }
    .book-cover-wrap {
      width: 100%; aspect-ratio: 3/4;
      border-radius: 6px; overflow: hidden;
      box-shadow: 3px 4px 16px rgba(0,0,0,.22), -1px 0 0 rgba(0,0,0,.08);
      position: relative; transition: transform .2s;
    }
    .book-item:active .book-cover-wrap { transform: scale(.96) translateY(2px); }
    .book-cover-img { width: 100%; height: 100%; object-fit: cover; }
    .book-cover-default {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      padding: 10px; position: relative;
    }
    .book-cover-default::after {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 4px; background: rgba(0,0,0,.15);
    }
    .book-default-title {
      font-size: 12px; font-weight: 600; color: #fff;
      text-align: center; line-height: 1.4;
      text-shadow: 0 1px 4px rgba(0,0,0,.3);
      word-break: break-all; padding-left: 4px;
    }
    .book-info { width: 100%; margin-top: 8px; padding: 0 2px; }
    .book-name {
      font-size: 12px; font-weight: 500; color: #1c1c1e;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      text-align: center;
    }
    .book-dates { font-size: 10px; color: #8e8e93; text-align: center; margin-top: 2px; }

    /* 添加书籍按钮 */
    .add-book-fab {
      position: fixed; bottom: calc(28px + env(safe-area-inset-bottom, 0px));
      right: 20px; width: 56px; height: 56px; border-radius: 50%;
      background: linear-gradient(135deg, #1c1c3a, #2d2b55);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 20px rgba(28,28,58,.45);
      cursor: pointer; z-index: 100;
      transition: transform .15s, box-shadow .15s;
    }
    .add-book-fab:active { transform: scale(.92); box-shadow: 0 3px 10px rgba(28,28,58,.35); }
    .add-book-fab svg { width: 28px; height: 28px; color: #fff; }

    /* 空状态 */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 80px 40px; text-align: center;
    }
    .empty-icon { font-size: 64px; margin-bottom: 20px; opacity: .6; }
    .empty-title { font-size: 18px; font-weight: 600; color: #3c3c43; margin-bottom: 8px; }
    .empty-desc { font-size: 14px; color: #8e8e93; line-height: 1.6; }

    /* ========================================
       ADD BOOK PAGE
    ======================================== */
    #page-add-book { background: #f2f1f6; }
    .add-book-scroll {
      flex: 1; overflow-y: auto; padding: 16px 16px 40px;
      -webkit-overflow-scrolling: touch;
    }
    .form-section {
      background: #fff; border-radius: 14px;
      overflow: hidden; margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .form-section-title {
      font-size: 12px; color: #8e8e93; font-weight: 500;
      padding: 14px 16px 6px; text-transform: uppercase; letter-spacing: .5px;
    }
    .form-row {
      display: flex; align-items: center;
      padding: 14px 16px; border-bottom: .5px solid #f2f2f7;
      min-height: 52px;
    }
    .form-row:last-child { border-bottom: none; }
    .form-label {
      font-size: 15px; color: #1c1c1e; min-width: 72px; flex-shrink: 0;
    }
    .form-input {
      flex: 1; font-size: 15px; color: #1c1c1e;
      text-align: right; background: none;
    }
    .form-input::placeholder { color: #c7c7cc; }
    .form-value {
      flex: 1; font-size: 15px; color: #8e8e93; text-align: right;
    }
    .form-value.has-value { color: #1c1c1e; }
    .form-arrow { margin-left: 6px; color: #c7c7cc; flex-shrink: 0; }

    /* 封面上传区 */
    .cover-upload-area {
      display: flex; flex-direction: column; align-items: center;
      padding: 20px; cursor: pointer;
    }
    .cover-preview {
      width: 100px; height: 133px; border-radius: 8px;
      object-fit: cover; box-shadow: 0 4px 16px rgba(0,0,0,.18);
    }
    .cover-placeholder {
      width: 100px; height: 133px; border-radius: 8px;
      border: 2px dashed #d1d1d6;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 8px; color: #8e8e93; font-size: 13px;
      background: #f9f9f9;
    }
    .cover-placeholder svg { width: 32px; height: 32px; color: #c7c7cc; }
    .cover-hint { font-size: 12px; color: #8e8e93; margin-top: 10px; }

    /* 文件选择 */
    .file-upload-btn {
      flex: 1; display: flex; align-items: center; justify-content: flex-end; gap: 4px;
      font-size: 15px; color: #007aff;
    }
    .file-name-tag {
      font-size: 13px; color: #8e8e93; background: #f2f1f6;
      padding: 3px 8px; border-radius: 6px; max-width: 160px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .file-type-badge {
      font-size: 11px; font-weight: 600; color: #fff;
      padding: 2px 7px; border-radius: 4px;
      background: #ff3b30;
    }
    .file-type-badge.word { background: #2f65c4; }

    /* 保存按钮 */
    .save-btn {
      display: block; width: 100%; margin: 0 0 24px;
      background: linear-gradient(135deg, #1c1c3a, #2d2b55);
      color: #fff; font-size: 17px; font-weight: 600;
      padding: 16px; border-radius: 14px;
      text-align: center; letter-spacing: 1px;
      box-shadow: 0 4px 16px rgba(28,28,58,.3);
      transition: transform .15s, opacity .15s;
    }
    .save-btn:active { transform: scale(.98); opacity: .9; }

    /* ========================================
       NOTES PAGE
    ======================================== */
    #page-notes { background: #f2f1f6; }
    .notes-header {
      flex-shrink: 0; position: relative; overflow: hidden;
    }
    .notes-header-bg {
      position: absolute; inset: 0;
      background: linear-gradient(160deg, #1c1c3a, #2d2b55);
    }
    .notes-header-content {
      position: relative; z-index: 1; padding: 0 16px 20px;
    }
    .notes-header-navbar {
      display: flex; align-items: center;
      height: 52px;
    }
    .notes-back-btn {
      display: flex; align-items: center; gap: 2px;
      color: rgba(255,255,255,.9); font-size: 16px; background: none; border: none;
    }
    .notes-back-btn svg { width: 22px; height: 22px; }
    .notes-book-card {
      display: flex; gap: 16px; align-items: flex-start;
      margin-top: 8px;
    }
    .notes-book-cover {
      width: 64px; height: 85px; border-radius: 6px; flex-shrink: 0;
      box-shadow: 3px 4px 16px rgba(0,0,0,.4);
      overflow: hidden;
    }
    .notes-book-cover img { width: 100%; height: 100%; object-fit: cover; }
    .notes-book-cover-default {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      padding: 6px; position: relative;
    }
    .notes-book-cover-default::after {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; background: rgba(0,0,0,.2);
    }
    .notes-book-cover-default span {
      font-size: 10px; color: #fff; text-align: center;
      font-weight: 600; line-height: 1.4; padding-left: 3px;
    }
    .notes-book-meta { flex: 1; }
    .notes-book-title {
      font-size: 18px; font-weight: 700; color: #fff;
      margin-bottom: 10px; line-height: 1.3;
    }
    .notes-time-row {
      display: flex; align-items: center; gap: 6px; margin-bottom: 6px; cursor: pointer;
    }
    .notes-time-label {
      font-size: 11px; color: rgba(255,255,255,.55); min-width: 52px;
    }
    .notes-time-value {
      font-size: 12px; color: rgba(255,255,255,.85);
      background: rgba(255,255,255,.12); padding: 2px 10px; border-radius: 20px;
    }
    .notes-time-edit-icon { color: rgba(255,255,255,.5); }
    .notes-time-edit-icon svg { width: 13px; height: 13px; }

    .notes-count-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 16px; background: #fff;
      border-bottom: .5px solid #f2f2f7; flex-shrink: 0;
    }
    .notes-count-num {
      font-size: 28px; font-weight: 700; color: #1c1c1e;
    }
    .notes-count-label {
      font-size: 13px; color: #8e8e93;
    }

    .notes-scroll {
      flex: 1; overflow-y: auto; padding: 16px 16px 100px;
      -webkit-overflow-scrolling: touch;
    }

    /* 笔记卡片 */
    .note-card {
      background: #fff; border-radius: 14px;
      margin-bottom: 14px; overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      display: flex;
    }
    .note-date-col {
      width: 60px; flex-shrink: 0;
      background: linear-gradient(180deg, #f9f9fb, #f2f2f7);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 16px 0; border-right: .5px solid #f2f2f7;
    }
    .note-day { font-size: 26px; font-weight: 700; color: #1c1c1e; line-height: 1; }
    .note-month { font-size: 12px; color: #8e8e93; margin-top: 2px; }
    .note-weekday { font-size: 11px; color: #c7c7cc; margin-top: 2px; }
    .note-body { flex: 1; padding: 14px 14px 12px; }
    .note-content {
      font-size: 15px; color: #1c1c1e; line-height: 1.65;
      display: -webkit-box; -webkit-line-clamp: 4;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .note-footer {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 10px;
    }
    .note-time { font-size: 11px; color: #c7c7cc; }
    .note-actions { display: flex; gap: 8px; }
    .note-action-btn {
      display: flex; align-items: center; gap: 3px;
      font-size: 12px; padding: 4px 10px; border-radius: 8px;
      font-weight: 500; transition: opacity .15s;
    }
    .note-action-btn:active { opacity: .7; }
    .note-action-btn svg { width: 13px; height: 13px; }
    .note-edit-btn { color: #007aff; background: rgba(0,122,255,.08); }
    .note-delete-btn { color: #ff3b30; background: rgba(255,59,48,.08); }

    /* 添加笔记 FAB */
    .add-note-fab {
      position: fixed; bottom: calc(28px + env(safe-area-inset-bottom, 0px));
      right: 20px;
      display: flex; align-items: center; gap: 8px;
      background: linear-gradient(135deg, #1c1c3a, #2d2b55);
      color: #fff; font-size: 15px; font-weight: 600;
      padding: 14px 22px; border-radius: 50px;
      box-shadow: 0 6px 20px rgba(28,28,58,.4);
      cursor: pointer; z-index: 100;
      transition: transform .15s;
    }
    .add-note-fab:active { transform: scale(.96); }
    .add-note-fab svg { width: 18px; height: 18px; }

    /* ========================================
       NOTE EDIT PAGE
    ======================================== */
    #page-note-edit { background: #f2f2f7; }
    .note-edit-header {
      background: rgba(242,242,247,.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: .5px solid rgba(0,0,0,.08);
      flex-shrink: 0;
    }
    .note-edit-date-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 16px 12px;
    }
    .note-edit-date { font-size: 13px; color: #8e8e93; }
    .note-edit-time { font-size: 22px; font-weight: 300; color: #1c1c1e; }
    .note-save-btn {
      background: linear-gradient(135deg, #1c1c3a, #2d2b55);
      color: #fff; font-size: 14px; font-weight: 600;
      padding: 8px 18px; border-radius: 20px;
      opacity: .4; transition: opacity .2s, transform .15s;
    }
    .note-save-btn.active { opacity: 1; }
    .note-save-btn:active { transform: scale(.96); }

    .note-edit-body { flex: 1; overflow-y: auto; padding: 0 16px 40px; }
    .notebook-paper {
      background: #fff; border-radius: 14px; margin-top: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,.07); overflow: hidden;
      position: relative;
    }
    .notebook-dots {
      display: flex; gap: 6px; padding: 12px 14px 10px;
      border-bottom: .5px solid #f0f0f0;
    }
    .notebook-dot {
      width: 12px; height: 12px; border-radius: 50%;
    }
    .notebook-dot.red { background: #ff5f57; }
    .notebook-dot.yellow { background: #febc2e; }
    .notebook-dot.green { background: #28c840; }
    .notebook-lines-wrap {
      position: relative; padding: 0;
    }
    .notebook-red-line {
      position: absolute; left: 48px; top: 0; bottom: 0;
      width: 1px; background: rgba(255,59,48,.25); pointer-events: none;
    }
    .notebook-textarea {
      width: 100%; min-height: 320px; padding: 14px 16px 14px 56px;
      font-size: 16px; line-height: 32px; color: #1c1c1e;
      resize: none; background: transparent; display: block;
      background-image: repeating-linear-gradient(
        transparent, transparent 31px, #e8e8ed 31px, #e8e8ed 32px
      );
      background-size: 100% 32px; background-position: 0 14px;
    }
    .notebook-textarea::placeholder { color: #c7c7cc; }

    .note-edit-footer {
      flex-shrink: 0; padding: 10px 16px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(242,242,247,.9);
      border-top: .5px solid rgba(0,0,0,.06);
    }
    .word-count-badge {
      font-size: 13px; color: #8e8e93; background: #e5e5ea;
      padding: 4px 10px; border-radius: 12px;
    }
    .note-done-btn {
      display: flex; align-items: center; gap: 6px;
      background: linear-gradient(135deg, #34c759, #28a745);
      color: #fff; font-size: 15px; font-weight: 600;
      padding: 10px 22px; border-radius: 22px;
      box-shadow: 0 4px 12px rgba(52,199,89,.35);
      transition: transform .15s;
    }
    .note-done-btn:active { transform: scale(.96); }
    .note-done-btn svg { width: 16px; height: 16px; }

    /* ========================================
       DATE PICKER MODAL
    ======================================== */
    .modal-mask {
      position: fixed; inset: 0; z-index: 999;
      background: rgba(0,0,0,.5);
      display: none; align-items: flex-end;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .modal-mask.show { display: flex; }
    .date-picker-panel {
      width: 100%; background: #f2f1f6;
      border-radius: 16px 16px 0 0;
      padding-bottom: env(safe-area-inset-bottom, 16px);
      animation: slide-up .3s ease;
    }
    @keyframes slide-up {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }
    .date-picker-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; border-bottom: .5px solid rgba(0,0,0,.08);
    }
    .date-picker-cancel {
      font-size: 16px; color: #8e8e93; padding: 4px 8px;
    }
    .date-picker-title {
      font-size: 16px; font-weight: 600; color: #1c1c1e;
    }
    .date-picker-confirm {
      font-size: 16px; color: #007aff; font-weight: 600; padding: 4px 8px;
    }
    .date-picker-body {
      display: flex; gap: 0;
    }
    .date-picker-col {
      flex: 1; height: 200px; overflow: hidden; position: relative;
      cursor: pointer;
    }
    .date-picker-col::before, .date-picker-col::after {
      content: ''; position: absolute; left: 0; right: 0; height: 72px;
      pointer-events: none; z-index: 2;
    }
    .date-picker-col::before {
      top: 0;
      background: linear-gradient(to bottom, rgba(242,241,246,1), rgba(242,241,246,0));
    }
    .date-picker-col::after {
      bottom: 0;
      background: linear-gradient(to top, rgba(242,241,246,1), rgba(242,241,246,0));
    }
    .date-picker-indicator {
      position: absolute; top: 50%; left: 8px; right: 8px;
      height: 40px; margin-top: -20px;
      background: rgba(0,0,0,.06); border-radius: 8px;
      pointer-events: none; z-index: 1;
    }
    .date-picker-list {
      height: 100%; overflow-y: scroll; scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .date-picker-list::-webkit-scrollbar { display: none; }
    .date-picker-item {
      height: 40px; display: flex; align-items: center; justify-content: center;
      font-size: 16px; color: #1c1c1e; scroll-snap-align: start;
      user-select: none;
    }
    /* padding top/bottom so first/last item can center */
    .date-picker-list::before, .date-picker-list::after {
      content: ''; display: block; height: 80px;
    }

    /* ========================================
       CONFIRM DIALOG
    ======================================== */
    .confirm-mask {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,.45);
      display: none; align-items: center; justify-content: center;
      padding: 32px;
    }
    .confirm-mask.show { display: flex; }
    .confirm-dialog {
      background: rgba(242,242,247,.98);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 16px; width: 100%; max-width: 300px;
      overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,.3);
      animation: dialog-pop .25s ease;
    }
    @keyframes dialog-pop {
      from { transform: scale(.85); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    .confirm-title {
      font-size: 17px; font-weight: 600; color: #1c1c1e;
      text-align: center; padding: 20px 16px 8px;
    }
    .confirm-msg {
      font-size: 13px; color: #6c6c70; text-align: center;
      padding: 0 16px 20px; line-height: 1.5;
    }
    .confirm-btns {
      border-top: .5px solid rgba(0,0,0,.1);
      display: flex;
    }
    .confirm-btn {
      flex: 1; padding: 14px; text-align: center;
      font-size: 16px; background: none;
      border: none; cursor: pointer;
    }
    .confirm-btn + .confirm-btn {
      border-left: .5px solid rgba(0,0,0,.1);
    }
    .confirm-btn-cancel { color: #1c1c1e; }
    .confirm-btn-danger { color: #ff3b30; font-weight: 600; }
    .confirm-btn-ok { color: #007aff; font-weight: 600; }

    /* ========================================
       TOAST
    ======================================== */
    .toast {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,.75); color: #fff;
      font-size: 14px; padding: 10px 20px; border-radius: 24px;
      z-index: 2000; opacity: 0; transition: opacity .3s;
      white-space: nowrap; pointer-events: none;

<script>
/* ================================================
   CONSTANTS
================================================ */
const COVER_COLORS = [
  ['#667eea','#764ba2'],['#c9a96e','#a07840'],['#43e97b','#38f9d7'],
  ['#fa709a','#fee140'],['#30cfd0','#330867'],['#a18cd1','#fbc2eb'],
  ['#ff9a9e','#fad0c4'],['#f093fb','#f5576c'],['#4facfe','#00f2fe'],
  ['#f7971e','#ffd200']
];
const WEEKDAYS = ['周日','周一','周二','周三','周四','周五','周六'];
const MONTHS_CN = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

/* ================================================
   STATE
================================================ */
let currentPage = 'splash';
let currentBookId = null;
let currentNoteId = null;
let isEditNote = false;
let timeInterval = null;
let datePickerTarget = null; // 'start'|'finish'|'noteStart'|'noteFinish'
let confirmCallback = null;

/* ================================================
   STORAGE HELPERS
================================================ */
function getBooks() { try { return JSON.parse(localStorage.getItem('sss_books') || '[]'); } catch(e){ return []; } }
function saveBooks(b) { localStorage.setItem('sss_books', JSON.stringify(b)); }
function getNotes() { try { return JSON.parse(localStorage.getItem('sss_notes') || '{}'); } catch(e){ return {}; } }
function saveNotes(n) { localStorage.setItem('sss_notes', JSON.stringify(n)); }

/* ================================================
   PAGE ROUTING
================================================ */
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  currentPage = id;
}

function goBack() {
  if (currentPage === 'add-book') { showPage('bookshelf'); renderBookshelf(); }
  else if (currentPage === 'notes')     { showPage('bookshelf'); renderBookshelf(); }
  else if (currentPage === 'note-edit') { showPage('notes'); renderNotes(currentBookId); }
}

/* ================================================
   SPLASH
================================================ */
(function initParticles() {
  const container = document.getElementById('splashParticles');
  const colors = ['#c9a96e','#667eea','#a18cd1','#4facfe','#43e97b'];
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 4 + Math.random() * 8;
    p.style.cssText = `
      width:${size}px;height:${size}px;
      left:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${6+Math.random()*8}s;
      animation-delay:${-Math.random()*8}s;
    `;
    container.appendChild(p);
  }
})();

function enterApp() { showPage('bookshelf'); renderBookshelf(); }

/* ================================================
   BOOKSHELF
================================================ */
function renderBookshelf() {
  const books = getBooks();
  const grid = document.getElementById('bookGrid');
  const empty = document.getElementById('bookEmpty');
  const meta = document.getElementById('bookCountMeta');

  if (books.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'flex';
    meta.textContent = '暂无书籍';
    return;
  }
  empty.style.display = 'none';
  meta.textContent = `共 ${books.length} 本书`;

  grid.innerHTML = books.map((book, i) => {
    const c = COVER_COLORS[i % COVER_COLORS.length];
    const coverHtml = book.coverUrl
      ? `<img class="book-cover-img" src="${book.coverUrl}" alt="封面">`
      : `<div class="book-cover-default" style="background:linear-gradient(135deg,${c[0]},${c[1]})">
           <span class="book-default-title">${escHtml(book.title)}</span>
         </div>`;
    const dateStr = book.startTime
      ? (book.finishTime ? `${book.startTime} ～ ${book.finishTime}` : `${book.startTime} 开始`)
      : '';
    return `
      <div class="book-item" onclick="goNotes('${book.id}')">
        <div class="book-cover-wrap">${coverHtml}</div>
        <div class="book-info">
          <div class="book-name">${escHtml(book.title)}</div>
          ${dateStr ? `<div class="book-dates">${dateStr}</div>` : ''}
        </div>
      </div>`;
  }).join('');
}

function goAddBook() {
  // reset form
  document.getElementById('titleInput').value = '';
  document.getElementById('coverPreview').style.display = 'none';
  document.getElementById('coverPlaceholder').style.display = 'flex';
  document.getElementById('fileNameDisplay').style.display = 'none';
  document.getElementById('fileTypeBadge').style.display = 'none';
  document.getElementById('fileUploadText').style.display = '';
  document.getElementById('startTimeDisplay').textContent = formatDate(new Date());
  document.getElementById('startTimeDisplay').className = 'form-value has-value';
  document.getElementById('finishTimeDisplay').textContent = '未完成';
  document.getElementById('finishTimeDisplay').className = 'form-value';
  window._addBookState = { coverUrl: '', fileName: '', fileType: '', startTime: formatDate(new Date()), finishTime: '' };
  showPage('add-book');
}

/* ================================================
   ADD BOOK
================================================ */
function chooseCover() { document.getElementById('coverFileInput').click(); }
function onCoverSelected(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    window._addBookState.coverUrl = e.target.result;
    document.getElementById('coverPreview').src = e.target.result;
    document.getElementById('coverPreview').style.display = 'block';
    document.getElementById('coverPlaceholder').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

function chooseFile() { document.getElementById('bookFileInput').click(); }
function onFileSelected(input) {
  const file = input.files[0]; if (!file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  if (!['pdf','doc','docx'].includes(ext)) { showToast('仅支持 PDF 或 Word 文件'); return; }
  const fileType = ext === 'pdf' ? 'PDF' : 'Word';
  const titleFromFile = file.name.replace(/\.[^.]+$/, '');
  window._addBookState.fileName = file.name;
  window._addBookState.fileType = fileType;
  document.getElementById('fileNameDisplay').textContent = file.name;
  document.getElementById('fileNameDisplay').style.display = 'inline-block';
  document.getElementById('fileTypeBadge').textContent = fileType;
  document.getElementById('fileTypeBadge').className = 'file-type-badge' + (fileType === 'Word' ? ' word' : '');
  document.getElementById('fileTypeBadge').style.display = 'inline-block';
  document.getElementById('fileUploadText').style.display = 'none';
  if (!document.getElementById('titleInput').value) {
    document.getElementById('titleInput').value = titleFromFile;
  }
}

function saveBook() {
  const title = document.getElementById('titleInput').value.trim();
  if (!title) { showToast('请输入书名'); return; }
  const state = window._addBookState || {};
  if (!state.startTime) { showToast('请选择开始阅读时间'); return; }

  const books = getBooks();
  books.unshift({
    id: Date.now().toString(),
    title,
    coverUrl: state.coverUrl || '',
    fileName: state.fileName || '',
    fileType: state.fileType || '',
    startTime: state.startTime,
    finishTime: state.finishTime || '',
    createTime: formatDateTime(new Date())
  });
  saveBooks(books);
  showToast('添加成功 ✓');
  setTimeout(() => { showPage('bookshelf'); renderBookshelf(); }, 700);
}

/* ================================================
   NOTES
================================================ */
function goNotes(bookId) {
  currentBookId = bookId;
  showPage('notes');
  renderNotes(bookId);
}

function renderNotes(bookId) {
  const books = getBooks();
  const bookIdx = books.findIndex(b => b.id === bookId);
  const book = books[bookIdx] || {};
  const c = COVER_COLORS[bookIdx >= 0 ? bookIdx % COVER_COLORS.length : 0];

  // 封面
  const coverEl = document.getElementById('notesBookCover');
  if (book.coverUrl) {
    coverEl.innerHTML = `<img src="${book.coverUrl}" style="width:100%;height:100%;object-fit:cover">`;
  } else {
    coverEl.innerHTML = `
      <div class="notes-book-cover-default" style="background:linear-gradient(135deg,${c[0]},${c[1]});width:100%;height:100%">
        <span>${escHtml(book.title||'')}</span>
      </div>`;
  }
  document.getElementById('notesHeaderBg').style.background = `linear-gradient(160deg,${c[0]}cc,${c[1]}cc)`;
  document.getElementById('notesBookTitle').textContent = book.title || '';
  document.getElementById('notesStartTime').textContent = book.startTime || '未设置';
  document.getElementById('notesFinishTime').textContent = book.finishTime || '未完成';

  // 笔记列表
  const allNotes = getNotes();
  const bookNotes = (allNotes[bookId] || []).map(n => {
    const d = new Date(n.createTime);
    return { ...n, dayNum: d.getDate(), monthStr: MONTHS_CN[d.getMonth()], weekday: WEEKDAYS[d.getDay()] };
  }).sort((a,b) => new Date(b.createTime) - new Date(a.createTime));

  document.getElementById('notesCountNum').textContent = bookNotes.length;
  const scroll = document.getElementById('notesScroll');
  if (bookNotes.length === 0) {
    scroll.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">✏️</div>
        <div class="empty-title">还没有笔记</div>
        <div class="empty-desc">点击右下角「写笔记」<br>记录下你的阅读感悟吧</div>
      </div>`;
    return;
  }
  scroll.innerHTML = bookNotes.map(n => `
    <div class="note-card">
      <div class="note-date-col">
        <div class="note-day">${n.dayNum}</div>
        <div class="note-month">${n.monthStr}</div>
        <div class="note-weekday">${n.weekday}</div>
      </div>
      <div class="note-body">
        <div class="note-content">${escHtml(n.content)}</div>
        <div class="note-footer">
          <span class="note-time">${n.updateTime || n.createTime}</span>
          <div class="note-actions">
            <button class="note-action-btn note-edit-btn" onclick="editNote('${n.id}')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
              </svg>
              编辑
            </button>
            <button class="note-action-btn note-delete-btn" onclick="deleteNote('${n.id}')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
                <path d="M10 11v6M14 11v6"/>
              </svg>
              删除
            </button>
          </div>
        </div>
      </div>
    </div>`).join('');
}

function goAddNote() {
  currentNoteId = null; isEditNote = false;
  openNoteEdit();
}
function editNote(noteId) {
  currentNoteId = noteId; isEditNote = true;
  openNoteEdit();
}
function openNoteEdit() {
  document.getElementById('noteEditTitle').textContent = isEditNote ? '编辑笔记' : '新建笔记';
  const ta = document.getElementById('noteTextarea');
  ta.value = '';
  document.getElementById('wordCount').textContent = '0';
  document.getElementById('noteSaveBtn').classList.remove('active');

  if (isEditNote && currentNoteId) {
    const allNotes = getNotes();
    const bookNotes = allNotes[currentBookId] || [];
    const note = bookNotes.find(n => n.id === currentNoteId);
    if (note) {
      ta.value = note.content;
      document.getElementById('wordCount').textContent = note.content.length;
      document.getElementById('noteSaveBtn').classList.add('active');
    }
  }

  updateNoteEditTime();
  if (timeInterval) clearInterval(timeInterval);
  timeInterval = setInterval(updateNoteEditTime, 60000);

  showPage('note-edit');
}
function updateNoteEditTime() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('noteEditTime').textContent = `${hh}:${mm}`;
  document.getElementById('noteEditDate').textContent =
    `${now.getMonth()+1}月${now.getDate()}日  ${WEEKDAYS[now.getDay()]}`;
}
function onNoteInput(ta) {
  const len = ta.value.length;
  document.getElementById('wordCount').textContent = len;
  document.getElementById('noteSaveBtn').classList.toggle('active', len > 0);
}
function saveNote() {
  const content = document.getElementById('noteTextarea').value.trim();
  if (!content) { showToast('请输入笔记内容'); return; }

  const allNotes = getNotes();
  if (!allNotes[currentBookId]) allNotes[currentBookId] = [];
  const now = formatDateTime(new Date());

  if (isEditNote && currentNoteId) {
    const idx = allNotes[currentBookId].findIndex(n => n.id === currentNoteId);
    if (idx >= 0) {
      allNotes[currentBookId][idx].content = content;
      allNotes[currentBookId][idx].updateTime = now;
    }
  } else {
    allNotes[currentBookId].push({ id: Date.now().toString(), content, createTime: now, updateTime: now });
  }
  saveNotes(allNotes);
  if (timeInterval) clearInterval(timeInterval);
  showToast(isEditNote ? '已更新 ✓' : '笔记已保存 ✓');
  setTimeout(() => { showPage('notes'); renderNotes(currentBookId); }, 700);
}
function cancelNoteEdit() {
  const content = document.getElementById('noteTextarea').value.trim();
  if (content) {
    showConfirm('放弃编辑？', '笔记尚未保存，确定要返回吗？', '放弃', () => {
      if (timeInterval) clearInterval(timeInterval);
      showPage('notes'); renderNotes(currentBookId);
    });
  } else {
    if (timeInterval) clearInterval(timeInterval);
    showPage('notes'); renderNotes(currentBookId);
  }
}
function deleteNote(noteId) {
  showConfirm('确认删除', '删除后无法恢复，确定要删除这条笔记吗？', '删除', () => {
    const allNotes = getNotes();
    if (allNotes[currentBookId]) {
      allNotes[currentBookId] = allNotes[currentBookId].filter(n => n.id !== noteId);
      saveNotes(allNotes);
    }
    showToast('已删除');
    renderNotes(currentBookId);
  });
}

/* ================================================
   DATE PICKER
================================================ */
let _pickerYears = [], _pickerMonths = [], _pickerDays = [];
let _pickerSel = [0, 0, 0];

function buildPickerData() {
  const now = new Date();
  const cy = now.getFullYear();
  _pickerYears = []; for (let y = 2010; y <= cy+1; y++) _pickerYears.push(y);
  _pickerMonths = []; for (let m = 1; m <= 12; m++) _pickerMonths.push(m < 10 ? '0'+m : ''+m);
  _pickerDays = []; for (let d = 1; d <= 31; d++) _pickerDays.push(d < 10 ? '0'+d : ''+d);
}
buildPickerData();

function openDatePicker(target) {
  datePickerTarget = target;
  const titles = { start:'开始阅读时间', finish:'完成阅读时间', noteStart:'开始阅读时间', noteFinish:'完成阅读时间' };
  document.getElementById('datePickerTitle').textContent = titles[target] || '选择日期';

  let dateStr = '';
  if (target === 'start') dateStr = (window._addBookState||{}).startTime || '';
  if (target === 'finish') dateStr = (window._addBookState||{}).finishTime || '';
  if (target === 'noteStart') {
    const books = getBooks(); const b = books.find(x=>x.id===currentBookId)||{};
    dateStr = b.startTime || '';
  }
  if (target === 'noteFinish') {
    const books = getBooks(); const b = books.find(x=>x.id===currentBookId)||{};
    dateStr = b.finishTime || '';
  }

  const now = new Date();
  let yi = _pickerYears.indexOf(now.getFullYear()); if (yi < 0) yi = 0;
  let mi = now.getMonth();
  let di = now.getDate() - 1;

  if (dateStr) {
    const parts = dateStr.split('-');
    const yy = parseInt(parts[0]), mm = parts[1], dd = parts[2];
    const yIdx = _pickerYears.indexOf(yy);
    const mIdx = _pickerMonths.indexOf(mm);
    const dIdx = _pickerDays.indexOf(dd);
    if (yIdx >= 0) yi = yIdx;
    if (mIdx >= 0) mi = mIdx;
    if (dIdx >= 0) di = dIdx;
  }
  _pickerSel = [yi, mi, di];
  renderPickerLists();
  document.getElementById('datePickerModal').classList.add('show');
}

function renderPickerLists() {
  const lists = [
    { id: 'yearList', items: _pickerYears.map(String), selIdx: _pickerSel[0] },
    { id: 'monthList', items: _pickerMonths, selIdx: _pickerSel[1] },
    { id: 'dayList', items: _pickerDays, selIdx: _pickerSel[2] }
  ];
  lists.forEach(({ id, items, selIdx }, colIdx) => {
    const el = document.getElementById(id);
    el.innerHTML = items.map((v, i) =>
      `<div class="date-picker-item" style="font-weight:${i===selIdx?'600':'400'};color:${i===selIdx?'#1c1c1e':'#8e8e93'}">${v}</div>`
    ).join('');
    // scroll to selected
    requestAnimationFrame(() => { el.scrollTop = selIdx * 40; });
    // listen scroll
    el.onscroll = () => {
      const idx = Math.round(el.scrollTop / 40);
      _pickerSel[colIdx] = Math.max(0, Math.min(idx, items.length-1));
      // update highlight
      el.querySelectorAll('.date-picker-item').forEach((item, i) => {
        item.style.fontWeight = i === _pickerSel[colIdx] ? '600' : '400';
        item.style.color = i === _pickerSel[colIdx] ? '#1c1c1e' : '#8e8e93';
      });
    };
  });
}

function closeDatePicker() { document.getElementById('datePickerModal').classList.remove('show'); }
function onPickerMaskClick(e) { if (e.target === document.getElementById('datePickerModal')) closeDatePicker(); }

function confirmDatePicker() {
  const dateStr = `${_pickerYears[_pickerSel[0]]}-${_pickerMonths[_pickerSel[1]]}-${_pickerDays[_pickerSel[2]]}`;
  closeDatePicker();

  if (datePickerTarget === 'start') {
    window._addBookState.startTime = dateStr;
    document.getElementById('startTimeDisplay').textContent = dateStr;
    document.getElementById('startTimeDisplay').className = 'form-value has-value';
  } else if (datePickerTarget === 'finish') {
    window._addBookState.finishTime = dateStr;
    document.getElementById('finishTimeDisplay').textContent = dateStr;
    document.getElementById('finishTimeDisplay').className = 'form-value has-value';
  } else if (datePickerTarget === 'noteStart' || datePickerTarget === 'noteFinish') {
    const field = datePickerTarget === 'noteStart' ? 'startTime' : 'finishTime';
    const books = getBooks();
    const idx = books.findIndex(b => b.id === currentBookId);
    if (idx >= 0) {
      books[idx][field] = dateStr;
      saveBooks(books);
      document.getElementById(datePickerTarget === 'noteStart' ? 'notesStartTime' : 'notesFinishTime').textContent = dateStr;
      showToast('已更新 ✓');
    }
  }
}

/* ================================================
   CONFIRM DIALOG
================================================ */
function showConfirm(title, msg, okText, cb) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmMsg').textContent = msg;
  document.getElementById('confirmOkBtn').textContent = okText || '确定';
  confirmCallback = cb;
  document.getElementById('confirmMask').classList.add('show');
}
document.getElementById('confirmCancelBtn').onclick = () => {
  document.getElementById('confirmMask').classList.remove('show');
};
document.getElementById('confirmOkBtn').onclick = () => {
  document.getElementById('confirmMask').classList.remove('show');
  if (confirmCallback) confirmCallback();
};

/* ================================================
   TOAST
================================================ */
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

/* ================================================
   UTILS
================================================ */
function formatDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function formatDateTime(d) {
  return `${formatDate(d)} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
